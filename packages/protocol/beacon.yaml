# ─── Transport ────────────────────────────────────────────────────────────
#
# NO `mcp:` block declared. activities-api packages a CATALOG of MCP tool
# specs (packages/mcp-tools/tools/*.json) + manifest validator + bearer-token
# auth helpers — but it does NOT register a running MCP server in this repo
# (no @modelcontextprotocol/sdk usage, no StdioServerTransport, no McpServer
# bind). The published tools surface is consumed by hosts (cubquests-interface,
# ruggy, world-specific deployments) which wire the manifest + tool specs +
# auth fixtures into THEIR own MCP server runtime.
#
# Per BeaconV3 the `mcp:` block is OPTIONAL ("present once the building
# deploys a callable endpoint" — ADR-008 §D-11.1). It will be added when an
# HTTP/MCP runtime ships under this repo (forward path: a thin stdio adapter
# wrapping the typed ports + in-memory adapters + the manifest, OR a Railway
# deployment fronting the engine).
#
# NO `payment:` or `docs:` blocks — V3 drops them (V2-only fields).
